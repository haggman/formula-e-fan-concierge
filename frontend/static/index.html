<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Race-Day Companion — Berlin 2024</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --line: #30363d;
    --text: #e6edf3; --dim: #8b949e;
    --accent: #58a6ff; --sel: #1f6feb33;
    --am: #f0883e; --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 "SF Mono", "Cascadia Code", Consolas, monospace;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: baseline; gap: 16px;
    padding: 10px 16px; border-bottom: 1px solid var(--line);
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .phase { color: var(--accent); text-transform: uppercase; font-size: 12px; }
  header .clock { margin-left: auto; color: var(--dim); }
  header .conn { font-size: 11px; }
  #audio-toggle {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  }
  #audio-toggle.muted { color: var(--dim); }
  #audio-toggle.live { border-color: var(--ok); color: var(--ok); }
  header .conn.ok { color: var(--ok); } header .conn.down { color: var(--bad); }

  main { flex: 1; display: grid; grid-template-columns: 320px 1fr; min-height: 0; }

  /* Car list (click to follow) */
  #tower { border-right: 1px solid var(--line); overflow-y: auto; padding: 8px 0; }
  #tower .listhint {
    font-size: 11px; color: var(--dim); padding: 2px 14px 8px; letter-spacing: .5px;
  }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 4px 12px; border-left: 3px solid transparent; cursor: pointer;
  }
  .row:hover { background: #ffffff0a; }
  .row.selected { background: var(--sel); border-left-color: var(--accent); }
  .row.retired { opacity: 0.35; text-decoration: line-through; cursor: default; }
  .row .pos { width: 30px; color: var(--dim); text-align: right; }
  .row.selected .pos { color: var(--accent); font-weight: 700; }
  .row .num { width: 34px; color: var(--dim); }
  .row .drv { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .ambadge {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    border: 1px solid var(--am); color: var(--am); visibility: hidden;
  }
  .row .ambadge.on { visibility: visible; background: var(--am); color: #000; }
  .row .pips { color: var(--dim); font-size: 11px; letter-spacing: 2px; }

  /* Right column */
  #right { display: flex; flex-direction: column; min-height: 0; }

  /* Selected-car (or field-wide) panel */
  #following {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px; border-bottom: 1px solid var(--line); font-size: 12px;
  }
  #following .who { font-weight: 700; color: var(--accent); }
  #following.fieldwide .who { color: var(--text); }
  #clear-sel {
    margin-left: auto; background: var(--panel); border: 1px solid var(--line);
    color: var(--dim); font: inherit; font-size: 11px; padding: 2px 10px;
    border-radius: 4px; cursor: pointer; visibility: hidden;
  }
  #following.selected #clear-sel { visibility: visible; }

  #selpanel {
    display: flex; align-items: center; justify-content: space-around;
    gap: 12px; padding: 14px 16px; border-bottom: 1px solid var(--line); min-height: 96px;
  }
  #selpanel.empty { color: var(--dim); font-style: italic; justify-content: center; }
  .cluster { text-align: center; min-width: 70px; }
  .cluster .label { font-size: 11px; color: var(--dim); text-transform: uppercase; margin-top: 4px; }
  .bigstat { font-size: 30px; font-weight: 700; line-height: 1.1; }
  .bigstat .unit { font-size: 13px; color: var(--dim); font-weight: 400; }
  #c-am .bigstat.amon { color: var(--am); }
  /* energy bar */
  .ebar { width: 110px; height: 10px; background: var(--line); border-radius: 5px; overflow: hidden; margin: 6px auto 0; }
  .ebar > div { height: 100%; width: 0; background: var(--ok); transition: width .5s, background .5s; }

  /* Commentary feed */
  #feed-label { font-size: 11px; color: var(--dim); letter-spacing: 2px; padding: 8px 16px 0; }
  #radiolog { flex: 1; overflow-y: auto; padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .call { max-width: 760px; }
  .call .meta { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
  .call .meta .tag { color: var(--am); text-transform: uppercase; }
  .call .meta .foc { color: var(--accent); }
  .call .text { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; }
  .call.qa .text { border-color: var(--accent); }
  .call.question { align-self: flex-end; }
  .call.question .text { border-color: var(--accent); background: var(--sel); }
  .call.question .meta { text-align: right; }
  #pending { color: var(--dim); font-style: italic; display: none; }
  #placeholder { color: var(--dim); font-style: italic; }

  #askbar { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--line); }
  #askbar input {
    flex: 1; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 8px 12px; border-radius: 6px; font: inherit;
  }
  #askbar button {
    background: var(--accent); border: 0; color: #000; font: inherit;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
  }
  #mic {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    user-select: none;
  }
  #mic.rec { background: var(--bad); border-color: var(--bad); color: #fff; }
  #mic.busy { opacity: 0.5; }

  /* Simulator systems bar (demo control) */
  #simbar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 16px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--dim);
  }
  #simbar .sim-label { letter-spacing: 2px; font-weight: 700; }
  #simbar button, #simbar select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  }
  #simbar button:hover { border-color: var(--dim); }
  #simbar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #sim-msg { margin-left: auto; }
</style>
</head>
<body>
<header>
  <h1>RACE-DAY COMPANION · BERLIN 2024</h1>
  <span class="phase" id="phase">—</span>
  <span class="clock" id="clock">t=—</span>
  <button id="audio-toggle" class="muted">🔇 MUTED</button>
  <span class="conn down" id="conn">● connecting</span>
</header>
<main>
  <div id="tower"><div class="listhint">Click a car to follow it</div></div>
  <div id="right">
    <div id="following" class="fieldwide">
      <span class="who" id="follow-who">Following the whole field</span>
      <button id="clear-sel" title="Stop following — back to the whole field">× field-wide</button>
    </div>
    <div id="selpanel" class="empty">Click a car on the left to see its live stats and have the commentary follow it.</div>

    <!--
      CX CONCIERGE CHAT WIDGET — follow-on / bonus (#5 + #7).
      The ask-anything concierge bot (work item #5) embeds here. Drop the CX /
      Dialogflow Messenger snippet for the deployed agent in this spot (it ships
      as a df-messenger custom element plus its loader). Left out of this pass
      on purpose; this is the natural "add the chatbot" exercise.
    -->

    <div id="feed-label">LIVE COMMENTARY</div>
    <div id="radiolog">
      <div id="placeholder">Waiting for the commentator…</div>
      <div id="pending">commentator is checking…</div>
    </div>
    <div id="askbar">
      <input id="question" placeholder="Ask the commentator about the race… (or hold SPACE to talk)">
      <button id="mic" title="Hold to talk (or hold Space outside the text box)">🎤</button>
      <button id="ask">ASK</button>
    </div>
    <div id="simbar">
      <span class="sim-label">SIM</span>
      <button id="sim-restart">RESTART</button>
      <button id="sim-pause">PAUSE</button>
      <select id="sim-speed">
        <option value="1">1×</option>
        <option value="2">2×</option>
        <option value="5">5×</option>
      </select>
      <label><input type="checkbox" id="sim-loop"> LOOP</label>
      <button id="sim-finish" title="Jump to ~10s before the flag">FINISH</button>
      <span id="sim-msg"></span>
    </div>
  </div>
</main>
<script>
const $ = id => document.getElementById(id);
// Driver surname map — the frozen 2024 Berlin entry list. Surnames match what
// the commentary voice says.
const DRIVERS = {
  "DEN": { last: "Dennis" }, "VAN": { last: "Vandoorne" }, "SET": { last: "Sette Câmara" },
  "ERI": { last: "Eriksson" }, "HUG": { last: "Hughes" }, "GUE": { last: "Günther" },
  "BAR": { last: "Barnard" }, "EVA": { last: "Evans" }, "DIG": { last: "Di Grassi" },
  "DAC": { last: "Da Costa" }, "ARO": { last: "Aron" }, "NAT": { last: "Nato" },
  "DAR": { last: "Daruvala" }, "KIN": { last: "King" }, "ROW": { last: "Rowland" },
  "FEN": { last: "Fenestraz" }, "JEV": { last: "Vergne" }, "TIC": { last: "Ticktum" },
  "CAS": { last: "Cassidy" }, "MOR": { last: "Mortara" }, "VDL": { last: "Van Der Linde" },
  "WEH": { last: "Wehrlein" },
};
const lastName = code => (DRIVERS[code] || {}).last || code || "—";

function fmtClock(s) {
  const m = Math.floor(s / 60), ss = String(Math.floor(s % 60)).padStart(2, "0");
  return `t=${m}:${ss}`;
}

// ----------------------------------------------------------------------------
// Selection — the fan clicks a car; the commentary narrows onto it.
// selectedCar is the single source of truth on the client; the server holds its
// own copy (set over the websocket) for the commentator loop's scoring.
// ----------------------------------------------------------------------------
let selectedCar = null;     // int | null
let lastState = null;       // most recent {type:"state"} message, for re-render

function sendSelection() {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: "select", car_number: selectedCar }));
  }
}

function selectCar(carNum) {
  selectedCar = (selectedCar === carNum) ? null : carNum;  // click again to clear
  sendSelection();
  if (lastState) renderState(lastState);
}

$("clear-sel").onclick = () => { selectedCar = null; sendSelection(); if (lastState) renderState(lastState); };

function renderState(msg) {
  lastState = msg;
  $("phase").textContent = msg.race_phase.replace(/_/g, " ");
  $("clock").textContent = fmtClock(msg.race_time_s);

  // --- car list ---
  const tower = $("tower");
  tower.innerHTML = '<div class="listhint">Click a car to follow it</div>';
  for (const c of msg.cars) {
    const row = document.createElement("div");
    row.className = "row" + (c.car === selectedCar ? " selected" : "") + (c.retired ? " retired" : "");
    row.innerHTML =
      `<span class="pos">P${c.position}</span>` +
      `<span class="num">#${c.car}</span>` +
      `<span class="drv">${lastName(c.driver)}</span>` +
      `<span class="ambadge${c.am_active ? " on" : ""}">AM</span>` +
      `<span class="pips">${"●".repeat(c.am_used)}${"○".repeat(Math.max(0, 2 - c.am_used))}</span>`;
    if (!c.retired) row.onclick = () => selectCar(c.car);
    tower.appendChild(row);
  }

  // --- following banner + selected-car panel ---
  const sel = selectedCar != null ? msg.cars.find(c => c.car === selectedCar) : null;
  const followEl = $("following"), whoEl = $("follow-who");
  if (selectedCar == null) {
    followEl.className = "fieldwide";
    whoEl.textContent = "Following the whole field";
    renderPanelEmpty("Click a car on the left to see its live stats and have the commentary follow it.");
  } else if (!sel) {
    followEl.className = "selected";
    whoEl.textContent = `Following #${selectedCar} — out / no data`;
    renderPanelEmpty(`Car ${selectedCar} isn't in the running field right now.`);
  } else {
    followEl.className = "selected";
    whoEl.textContent = `Following #${sel.car} · ${lastName(sel.driver)}`;
    renderPanel(sel);
  }
}

function renderPanelEmpty(text) {
  const p = $("selpanel");
  p.className = "empty";
  p.textContent = text;
}

function renderPanel(c) {
  const pct = Math.max(0, Math.min(100, c.energy_pct));
  const ecolor = pct > 40 ? "var(--ok)" : pct > 20 ? "var(--warn)" : "var(--bad)";
  const am = c.am_active
    ? `<span class="bigstat amon">ON</span>`
    : `<span class="bigstat">${c.am_used}/2</span>`;
  const p = $("selpanel");
  p.className = "";
  p.innerHTML =
    `<div class="cluster"><div class="bigstat">P${c.position}</div><div class="label">Position</div></div>` +
    `<div class="cluster"><div class="bigstat">${c.lap}</div><div class="label">Lap</div></div>` +
    `<div class="cluster"><div class="bigstat">${Math.round(c.speed_kmh)}<span class="unit"> km/h</span></div><div class="label">Speed</div></div>` +
    `<div class="cluster">` +
      `<div class="bigstat">${pct.toFixed(0)}<span class="unit"> %</span></div>` +
      `<div class="ebar"><div style="width:${pct}%;background:${ecolor}"></div></div>` +
      `<div class="label">Energy</div></div>` +
    `<div class="cluster" id="c-am">${am}` +
      `<div class="label">Attack Mode${c.am_active ? " · " + c.am_budget_s + "s" : ""}</div></div>`;
}

// --- commentary audio: sequential playback queue (one voice, one speaker) ---
let audioEnabled = false;
const audioQueue = [];
let audioPlaying = false;

function drainAudio() {
  if (audioPlaying || !audioEnabled || audioQueue.length === 0) return;
  audioPlaying = true;
  const el = new Audio("data:audio/mp3;base64," + audioQueue.shift());
  el.onended = el.onerror = () => { audioPlaying = false; drainAudio(); };
  el.play().catch(() => { audioPlaying = false; });
}

$("audio-toggle").onclick = () => {
  audioEnabled = !audioEnabled;
  const b = $("audio-toggle");
  b.className = audioEnabled ? "live" : "muted";
  b.textContent = audioEnabled ? "🔊 LIVE AUDIO" : "🔇 MUTED";
  if (!audioEnabled) audioQueue.length = 0;  // muting clears the backlog
  // the click itself is the user gesture that unlocks browser autoplay
};

function addCommentary(msg) {
  if (msg.audio && audioEnabled) { audioQueue.push(msg.audio); drainAudio(); }
  const ph = $("placeholder"); if (ph) ph.remove();
  const pending = $("pending");
  if (msg.kind === "qa") pending.style.display = "none";
  const div = document.createElement("div");
  const cls = msg.kind === "qa" ? " qa" : msg.kind === "question" ? " question" : "";
  div.className = "call" + cls;
  const who = msg.kind === "question" ? "YOU · " : "";
  const isCall = msg.kind && msg.kind !== "qa" && msg.kind !== "question";
  const foc = (msg.selected_car != null) ? ` · <span class="foc">▸ #${msg.selected_car}</span>` : "";
  div.innerHTML =
    `<div class="meta">${who}${fmtClock(msg.race_time_s)} · lap ${msg.lap}` +
    (isCall ? ` · <span class="tag">${msg.kind}</span>${foc}` : "") +
    (msg.secs != null ? ` · ${msg.secs}s` : "") +
    `</div><div class="text">${msg.text}</div>`;
  const log = $("radiolog");
  log.insertBefore(div, pending);
  if (msg.kind === "question") pending.style.display = "block";
  log.scrollTop = log.scrollHeight;
}

function sendQuestion() {
  const input = $("question");
  const q = input.value.trim();
  if (!q || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "ask", question: q }));
  input.value = "";
}
$("ask").onclick = sendQuestion;
$("question").addEventListener("keydown", e => { if (e.key === "Enter") sendQuestion(); });

// --- simulator controls (demo) ---
async function simCall(action, payload) {
  const msg = $("sim-msg");
  try {
    const r = await fetch(`/api/sim/${action}`, {
      method: action === "config" ? "GET" : "POST",
      headers: { "Content-Type": "application/json" },
      body: payload ? JSON.stringify(payload) : undefined,
    });
    if (!r.ok) throw new Error(await r.text());
    msg.textContent = "";
    return await r.json();
  } catch (e) {
    msg.textContent = "sim: " + (e.message || "unreachable").slice(0, 80);
    return null;
  }
}

let simPaused = false;
function setPauseLabel() { $("sim-pause").textContent = simPaused ? "RESUME" : "PAUSE"; }

async function initSimBar() {
  const cfg = await simCall("config");
  if (!cfg) return;
  const speeds = [1, 2, 5];
  const nearest = speeds.reduce((a, b) =>
    Math.abs(b - cfg.speed_multiplier) < Math.abs(a - cfg.speed_multiplier) ? b : a);
  $("sim-speed").value = String(nearest);
  $("sim-loop").checked = !!cfg.auto_restart;
  simPaused = !!cfg.paused;
  setPauseLabel();
}

$("sim-restart").onclick = async () => { await simCall("restart"); initSimBar(); };
$("sim-pause").onclick = async () => {
  const r = await simCall(simPaused ? "resume" : "pause");
  if (r) { simPaused = !!r.paused; setPauseLabel(); }
};
$("sim-speed").onchange = e => simCall("speed", { multiplier: Number(e.target.value) });
$("sim-loop").onchange = e => simCall("auto-restart", { enabled: e.target.checked });
$("sim-finish").onclick = async () => { await simCall("finish"); initSimBar(); };
initSimBar();

// --- push-to-talk: hold the mic button, or hold Space outside the input ---
let micStream = null, recorder = null, recChunks = [], recording = false;

async function pttStart() {
  if (recording) return;
  try {
    micStream = micStream || await navigator.mediaDevices.getUserMedia({ audio: true });
  } catch {
    $("mic").textContent = "🚫"; $("mic").title = "Microphone blocked by the browser";
    return;
  }
  recording = true;
  recChunks = [];
  recorder = new MediaRecorder(micStream);
  recorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
  recorder.onstop = sendRecording;
  recorder.start();
  $("mic").classList.add("rec");
  $("mic").textContent = "● REC";
}

function pttStop() {
  if (!recording) return;
  recording = false;
  recorder.stop();
  $("mic").classList.remove("rec");
  $("mic").textContent = "🎤";
}

async function sendRecording() {
  const blob = new Blob(recChunks, { type: recorder.mimeType });
  if (blob.size < 1000) return;  // a tap, not speech
  const mic = $("mic");
  mic.classList.add("busy"); mic.textContent = "…";
  try {
    const r = await fetch("/api/stt", { method: "POST", body: blob });
    if (!r.ok) throw new Error();
    const { transcript } = await r.json();
    if (transcript) {
      $("question").value = transcript;
      setTimeout(sendQuestion, 600);
    }
  } catch {
    $("question").placeholder = "Didn't catch that — try again or type";
  } finally {
    mic.classList.remove("busy"); mic.textContent = "🎤";
  }
}

$("mic").addEventListener("mousedown", pttStart);
$("mic").addEventListener("touchstart", e => { e.preventDefault(); pttStart(); });
for (const ev of ["mouseup", "mouseleave", "touchend"])
  $("mic").addEventListener(ev, pttStop);

document.addEventListener("keydown", e => {
  if (e.code === "Space" && !e.repeat && document.activeElement !== $("question")) {
    e.preventDefault();
    pttStart();
  }
});
document.addEventListener("keyup", e => {
  if (e.code === "Space" && document.activeElement !== $("question")) {
    e.preventDefault();
    pttStop();
  }
});

// --- websocket ---
let ws, retry = 1000;
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    $("conn").textContent = "● live"; $("conn").className = "conn ok"; retry = 1000;
    if (selectedCar != null) sendSelection();   // re-sync selection after a reconnect
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "state") renderState(msg);
    else if (msg.type === "radio") addCommentary(msg);
  };
  ws.onclose = () => {
    $("conn").textContent = "● reconnecting"; $("conn").className = "conn down";
    setTimeout(connect, retry); retry = Math.min(retry * 2, 10000);
  };
}
connect();
</script>
</body>
</html>
