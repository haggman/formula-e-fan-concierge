<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Race-Day Companion — Berlin 2024</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --line: #30363d;
    --text: #e6edf3; --dim: #8b949e;
    --accent: #58a6ff; --sel: #1f6feb33;
    --am: #f0883e; --ok: #3fb950; --warn: #d29922; --bad: #f85149;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font: 14px/1.45 "SF Mono", "Cascadia Code", Consolas, monospace;
    height: 100vh; display: flex; flex-direction: column;
  }
  header {
    display: flex; align-items: baseline; gap: 16px;
    padding: 10px 16px; border-bottom: 1px solid var(--line); flex: 0 0 auto;
  }
  header h1 { font-size: 15px; font-weight: 600; }
  header .phase { color: var(--accent); text-transform: uppercase; font-size: 12px; }
  header .clock { margin-left: auto; color: var(--dim); }
  header .conn { font-size: 11px; }
  #audio-toggle {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  }
  #audio-toggle.muted { color: var(--dim); }
  #audio-toggle.live { border-color: var(--ok); color: var(--ok); }
  header .conn.ok { color: var(--ok); } header .conn.down { color: var(--bad); }

  main { flex: 1; display: grid; grid-template-columns: minmax(380px, 44%) 1fr; min-height: 0; }

  /* ---- left column: map (top) + order/stats (bottom) ---- */
  #left { display: flex; flex-direction: column; min-height: 0; border-right: 1px solid var(--line); }

  #mapwrap { flex: 1 1 36%; min-height: 0; position: relative; border-bottom: 1px solid var(--line); }
  #map { width: 100%; height: 100%; display: block; }

  /* horse-race gap strip: leader at left, spacing ∝ real along-track gap */
  #gapwrap { flex: 0 0 auto; border-bottom: 1px solid var(--line); padding: 6px 0 8px; }
  .striplabel { font-size: 10px; color: var(--dim); letter-spacing: 1.5px; padding: 0 12px 5px; }
  #gapstrip { position: relative; height: 26px; margin: 0 12px; }
  .gapbox {
    position: absolute; top: 0; width: 24px; height: 24px; border-radius: 5px;
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; cursor: pointer; transition: left .8s linear;
  }
  .gapbox.am { border-color: var(--am); color: var(--am); }
  .gapbox.sel { background: var(--accent); border-color: var(--accent); color: #000; z-index: 2; }
  /* stroke-width is in METRES (the viewBox is metres) — Formula E tracks are ~12 m wide.
     Two stacked paths: a lighter kerb/border under a darker tarmac surface. */
  #track-edge { fill: none; stroke: #6e7681; stroke-width: 13; stroke-linejoin: round; stroke-linecap: round; }
  #track { fill: none; stroke: #21262d; stroke-width: 10; stroke-linejoin: round; stroke-linecap: round; }
  .cardot { fill: var(--dim); stroke: var(--bg); stroke-width: 1.5; cursor: pointer; }
  .cardot:hover { fill: var(--text); }
  .cardot.sel { fill: var(--accent); }
  .cardot.am { fill: var(--am); }
  .carlabel { fill: var(--text); font-size: 11px; font-weight: 700; pointer-events: none; }
  #map-msg {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-style: italic; text-align: center; padding: 24px;
  }

  #leftlower { flex: 1 1 48%; min-height: 0; display: flex; flex-direction: column; }
  #sel-head {
    display: flex; align-items: center; gap: 8px; padding: 8px 12px;
    border-bottom: 1px solid var(--line); font-size: 12px; flex: 0 0 auto;
  }
  #sel-head .who { font-weight: 700; }
  #sel-head.selected .who { color: var(--accent); }
  #clear-sel {
    margin-left: auto; background: var(--panel); border: 1px solid var(--line);
    color: var(--dim); font: inherit; font-size: 11px; padding: 2px 10px;
    border-radius: 4px; cursor: pointer; visibility: hidden;
  }
  #sel-head.selected #clear-sel { visibility: visible; }
  #statstrip {
    display: none; gap: 16px; padding: 8px 14px; border-bottom: 1px solid var(--line);
    flex: 0 0 auto; align-items: baseline;
  }
  #statstrip.show { display: flex; }
  #statstrip .s { display: flex; align-items: baseline; gap: 5px; }
  #statstrip .s b { font-size: 18px; font-weight: 700; }
  #statstrip .s span { font-size: 10px; color: var(--dim); text-transform: uppercase; }
  #statstrip .s.amon b { color: var(--am); }

  #order { flex: 1; overflow-y: auto; padding: 4px 0; }
  .row {
    display: flex; align-items: center; gap: 8px;
    padding: 3px 12px; border-left: 3px solid transparent; cursor: pointer;
  }
  .row:hover { background: #ffffff0a; }
  .row.selected { background: var(--sel); border-left-color: var(--accent); }
  .row.retired { opacity: 0.35; text-decoration: line-through; cursor: default; }
  .row .pos { width: 30px; color: var(--dim); text-align: right; }
  .row.selected .pos { color: var(--accent); font-weight: 700; }
  .row .num { width: 34px; color: var(--dim); }
  .row .drv { flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .row .ambadge {
    font-size: 10px; padding: 1px 6px; border-radius: 8px;
    border: 1px solid var(--am); color: var(--am); visibility: hidden;
  }
  .row .ambadge.on { visibility: visible; background: var(--am); color: #000; }
  .row .pips { color: var(--dim); font-size: 11px; letter-spacing: 2px; }

  /* ---- right column: continuous commentary ---- */
  #right { display: flex; flex-direction: column; min-height: 0; }
  #feed-label { font-size: 11px; color: var(--dim); letter-spacing: 2px; padding: 10px 16px 0; flex: 0 0 auto; }
  #radiolog { flex: 1; overflow-y: auto; padding: 8px 16px 12px; display: flex; flex-direction: column; gap: 8px; }
  .call { max-width: 860px; }
  .call .meta { font-size: 11px; color: var(--dim); margin-bottom: 2px; }
  .call .meta .tag { color: var(--am); text-transform: uppercase; }
  .call .meta .foc { color: var(--accent); }
  .call .text { background: var(--panel); border: 1px solid var(--line); border-radius: 6px; padding: 8px 12px; }
  .call.qa .text { border-color: var(--accent); }
  .call.question { align-self: flex-end; }
  .call.question .text { border-color: var(--accent); background: var(--sel); }
  .call.question .meta { text-align: right; }
  #pending { color: var(--dim); font-style: italic; display: none; }
  #placeholder { color: var(--dim); font-style: italic; }

  /* ---- bottom bars (full width) ---- */
  #bottombar { display: flex; gap: 8px; padding: 10px 16px; border-top: 1px solid var(--line); flex: 0 0 auto; }
  #bottombar input {
    flex: 1; background: var(--panel); border: 1px solid var(--line);
    color: var(--text); padding: 8px 12px; border-radius: 6px; font: inherit;
  }
  #bottombar button {
    background: var(--accent); border: 0; color: #000; font: inherit;
    padding: 8px 18px; border-radius: 6px; cursor: pointer;
  }
  #mic { background: var(--panel); border: 1px solid var(--line); color: var(--text); user-select: none; }
  #mic.rec { background: var(--bad); border-color: var(--bad); color: #fff; }
  #mic.busy { opacity: 0.5; }

  #simbar {
    display: flex; align-items: center; gap: 10px;
    padding: 6px 16px; border-top: 1px solid var(--line);
    font-size: 11px; color: var(--dim); flex: 0 0 auto;
  }
  #simbar .sim-label { letter-spacing: 2px; font-weight: 700; }
  #simbar button, #simbar select {
    background: var(--panel); border: 1px solid var(--line); color: var(--text);
    font: inherit; font-size: 11px; padding: 3px 10px; border-radius: 4px; cursor: pointer;
  }
  #simbar button:hover { border-color: var(--dim); }
  #simbar label { display: flex; align-items: center; gap: 4px; cursor: pointer; }
  #sim-msg { margin-left: auto; }
</style>
</head>
<body>
<header>
  <h1>RACE-DAY COMPANION · BERLIN 2024</h1>
  <span class="phase" id="phase">—</span>
  <span class="clock" id="clock">t=—</span>
  <button id="audio-toggle" class="muted">🔇 MUTED</button>
  <span class="conn down" id="conn">● connecting</span>
</header>
<main>
  <div id="left">
    <div id="mapwrap">
      <svg id="map" viewBox="0 0 631 544" preserveAspectRatio="xMidYMid meet">
        <path id="track-edge" d=""></path>
        <path id="track" d=""></path>
        <g id="cars"></g>
      </svg>
      <div id="map-msg">Loading track…</div>
    </div>
    <div id="gapwrap">
      <div class="striplabel">FIELD — leader at left · spacing ∝ gap · click to follow</div>
      <div id="gapstrip"></div>
    </div>
    <div id="leftlower">
      <div id="sel-head">
        <span class="who" id="sel-who">Running order — click a car to follow it</span>
        <button id="clear-sel" title="Stop following — back to the whole field">× field-wide</button>
      </div>
      <div id="statstrip"></div>
      <div id="order"></div>
    </div>
  </div>
  <div id="right">
    <div id="feed-label">LIVE COMMENTARY</div>
    <div id="radiolog">
      <div id="placeholder">Waiting for the commentator…</div>
      <div id="pending">commentator is checking…</div>
    </div>
  </div>
</main>
<div id="bottombar">
  <input id="question" placeholder="Ask the commentator about the race… (or hold SPACE to talk)">
  <button id="mic" title="Hold to talk (or hold Space outside the text box)">🎤</button>
  <button id="ask">ASK</button>
</div>
<div id="simbar">
  <span class="sim-label">SIM</span>
  <button id="sim-restart">RESTART</button>
  <button id="sim-pause">PAUSE</button>
  <select id="sim-speed"><option value="1">1×</option><option value="2">2×</option><option value="5">5×</option></select>
  <label><input type="checkbox" id="sim-loop"> LOOP</label>
  <button id="sim-finish" title="Jump to ~10s before the flag">FINISH</button>
  <span id="sim-msg"></span>
</div>

<!--
  CX CONCIERGE CHAT WIDGET — follow-on / bonus (#5 + #7). The ask-anything concierge bot
  embeds here (df-messenger custom element plus its loader). Left out of this pass on purpose.
-->

<script>
const $ = id => document.getElementById(id);
const SVGNS = "http://www.w3.org/2000/svg";
const DRIVERS = {
  "DEN": { last: "Dennis" }, "VAN": { last: "Vandoorne" }, "SET": { last: "Sette Câmara" },
  "ERI": { last: "Eriksson" }, "HUG": { last: "Hughes" }, "GUE": { last: "Günther" },
  "BAR": { last: "Barnard" }, "EVA": { last: "Evans" }, "DIG": { last: "Di Grassi" },
  "DAC": { last: "Da Costa" }, "ARO": { last: "Aron" }, "NAT": { last: "Nato" },
  "DAR": { last: "Daruvala" }, "KIN": { last: "King" }, "ROW": { last: "Rowland" },
  "FEN": { last: "Fenestraz" }, "JEV": { last: "Vergne" }, "TIC": { last: "Ticktum" },
  "CAS": { last: "Cassidy" }, "MOR": { last: "Mortara" }, "VDL": { last: "Van Der Linde" },
  "WEH": { last: "Wehrlein" },
};
const lastName = code => (DRIVERS[code] || {}).last || code || "—";
const fmtClock = s => `t=${Math.floor(s / 60)}:${String(Math.floor(s % 60)).padStart(2, "0")}`;

let selectedCar = null;   // int | null
let lastState = null;     // most recent state message
let T = null;             // projection transform from track_outline.json
let CENTER = [], CUMLEN = [], TRACK_LEN = 0;  // centerline points + arc-length (metres)

// ---- selection ----
function sendSelection() {
  if (ws && ws.readyState === WebSocket.OPEN)
    ws.send(JSON.stringify({ type: "select", car_number: selectedCar }));
}
function selectCar(carNum) {
  selectedCar = (selectedCar === carNum) ? null : carNum;
  sendSelection();
  if (lastState) renderState(lastState);
}
$("clear-sel").onclick = () => { selectedCar = null; sendSelection(); if (lastState) renderState(lastState); };

// ---- track outline (fetched once) ----
async function loadOutline() {
  try {
    const r = await fetch("/track_outline.json");
    if (!r.ok) throw new Error("not staged");
    const o = await r.json();
    T = o.transform;
    $("map").setAttribute("viewBox", o.viewBox);
    $("track").setAttribute("d", o.path);
    $("track-edge").setAttribute("d", o.path);
    // parse the path (SVG units == metres) into centerline points + arc-length,
    // so we can compute each car's distance around the lap for the gap strip
    const nums = (o.path.match(/-?\d+(?:\.\d+)?/g) || []).map(Number);
    CENTER = [];
    for (let i = 0; i + 1 < nums.length; i += 2) CENTER.push([nums[i], nums[i + 1]]);
    CUMLEN = [0];
    for (let i = 1; i < CENTER.length; i++) {
      CUMLEN.push(CUMLEN[i - 1] + Math.hypot(CENTER[i][0] - CENTER[i - 1][0], CENTER[i][1] - CENTER[i - 1][1]));
    }
    TRACK_LEN = CUMLEN.length ? CUMLEN[CUMLEN.length - 1] : 0;
    $("map-msg").style.display = "none";
    if (lastState) renderState(lastState);
  } catch {
    $("map-msg").textContent =
      "Track outline not loaded. Run notebooks/track_map_outline.ipynb and drop " +
      "track_outline.json into frontend/static/.";
    $("map-msg").style.display = "flex";
  }
}
function proj(lat, lng) {
  if (!T) return null;
  const x = (lng - T.lng0) * T.m_per_deg_lng;
  const y = (lat - T.lat0) * T.m_per_deg_lat;
  return [(x - T.minx) + T.pad, (T.maxy - y) + T.pad];
}
// distance (metres) around the lap for a car at (lat,lng) — nearest centerline vertex
function progress(lat, lng) {
  const p = proj(lat, lng);
  if (!p || !CENTER.length) return null;
  let best = 0, bd = Infinity;
  for (let i = 0; i < CENTER.length; i++) {
    const dx = CENTER[i][0] - p[0], dy = CENTER[i][1] - p[1], d = dx * dx + dy * dy;
    if (d < bd) { bd = d; best = i; }
  }
  return CUMLEN[best];
}

// horse-race gap strip: order by official position, space by real along-track gap
function renderGapStrip(cars) {
  const strip = $("gapstrip");
  if (!TRACK_LEN) { strip.innerHTML = ""; return; }
  const items = cars
    .filter(c => !c.retired && c.lat != null && c.lng != null)
    .map(c => ({ c, s: progress(c.lat, c.lng) }))
    .filter(o => o.s != null)
    .sort((a, b) => a.c.position - b.c.position);
  if (!items.length) { strip.innerHTML = ""; return; }

  // gap-to-leader in metres, accumulated from adjacent gaps (robust at the line)
  items[0].gap = 0;
  for (let i = 1; i < items.length; i++) {
    const ahead = items[i - 1], cur = items[i];
    let g = (ahead.c.lap - cur.c.lap) * TRACK_LEN + (ahead.s - cur.s);
    if (g < 0) g = 0;
    items[i].gap = items[i - 1].gap + g;
  }
  const maxGap = items[items.length - 1].gap || 1;
  const W = strip.clientWidth || 360, boxW = 24;
  const avail = Math.max(50, W - boxW);
  const scale = avail / maxGap;                                   // px per metre (scale-to-fit)
  const minSpace = Math.min(boxW + 2, avail / Math.max(1, items.length));  // keep bunched cars readable

  strip.innerHTML = "";
  let prevX = -1e9;
  for (const o of items) {
    let x = o.gap * scale;
    if (x - prevX < minSpace) x = prevX + minSpace;
    prevX = x;
    const sel = o.c.car === selectedCar;
    const d = document.createElement("div");
    d.className = "gapbox" + (sel ? " sel" : "") + (o.c.am_active ? " am" : "");
    d.style.left = x.toFixed(1) + "px";
    d.textContent = o.c.car;
    d.title = `#${o.c.car} ${lastName(o.c.driver)} · P${o.c.position}` +
              (o.gap ? ` · +${Math.round(o.gap)} m behind leader` : " · leader");
    d.onclick = () => selectCar(o.c.car);
    strip.appendChild(d);
  }
}

// ---- render: map dots, order list, selected-car stats ----
function renderMap(cars) {
  const g = $("cars");
  g.innerHTML = "";
  if (!T) return;
  for (const c of cars) {
    if (c.retired || c.lat == null || c.lng == null) continue;
    const p = proj(c.lat, c.lng);
    if (!p) continue;
    const sel = c.car === selectedCar;
    const dot = document.createElementNS(SVGNS, "circle");
    dot.setAttribute("cx", p[0].toFixed(1));
    dot.setAttribute("cy", p[1].toFixed(1));
    dot.setAttribute("r", sel ? 9 : 6);
    dot.setAttribute("class", "cardot" + (sel ? " sel" : c.am_active ? " am" : ""));
    dot.addEventListener("click", () => selectCar(c.car));
    const t = document.createElementNS(SVGNS, "title");
    t.textContent = `#${c.car} ${lastName(c.driver)} · P${c.position}`;
    dot.appendChild(t);
    g.appendChild(dot);
    if (sel) {  // label the followed car
      const lbl = document.createElementNS(SVGNS, "text");
      lbl.setAttribute("x", (p[0] + 11).toFixed(1));
      lbl.setAttribute("y", (p[1] + 4).toFixed(1));
      lbl.setAttribute("class", "carlabel");
      lbl.textContent = `#${c.car}`;
      g.appendChild(lbl);
    }
  }
}

function renderOrderAndStats(cars) {
  // header + (selected) stat strip
  const head = $("sel-head"), strip = $("statstrip");
  const sel = selectedCar != null ? cars.find(c => c.car === selectedCar) : null;
  if (selectedCar == null) {
    head.className = "";
    $("sel-who").textContent = "Running order — click a car to follow it";
    strip.className = ""; strip.innerHTML = "";
  } else {
    head.className = "selected";
    $("sel-who").textContent = sel
      ? `Following #${sel.car} · ${lastName(sel.driver)}`
      : `Following #${selectedCar} — out / no data`;
    if (sel) {
      const pct = Math.max(0, Math.min(100, sel.energy_pct));
      strip.className = "show";
      strip.innerHTML =
        `<div class="s"><b>P${sel.position}</b><span>pos</span></div>` +
        `<div class="s"><b>${sel.lap}</b><span>lap</span></div>` +
        `<div class="s"><b>${Math.round(sel.speed_kmh)}</b><span>km/h</span></div>` +
        `<div class="s"><b>${pct.toFixed(0)}</b><span>% energy</span></div>` +
        `<div class="s${sel.am_active ? " amon" : ""}"><b>${sel.am_active ? "ON" : sel.am_used + "/2"}</b><span>attack</span></div>`;
    } else {
      strip.className = ""; strip.innerHTML = "";
    }
  }
  // order list
  const order = $("order");
  order.innerHTML = "";
  for (const c of cars) {
    const row = document.createElement("div");
    row.className = "row" + (c.car === selectedCar ? " selected" : "") + (c.retired ? " retired" : "");
    row.innerHTML =
      `<span class="pos">P${c.position}</span>` +
      `<span class="num">#${c.car}</span>` +
      `<span class="drv">${lastName(c.driver)}</span>` +
      `<span class="ambadge${c.am_active ? " on" : ""}">AM</span>` +
      `<span class="pips">${"●".repeat(c.am_used)}${"○".repeat(Math.max(0, 2 - c.am_used))}</span>`;
    if (!c.retired) row.onclick = () => selectCar(c.car);
    order.appendChild(row);
  }
}

function renderState(msg) {
  lastState = msg;
  $("phase").textContent = msg.race_phase.replace(/_/g, " ");
  $("clock").textContent = fmtClock(msg.race_time_s);
  renderMap(msg.cars);
  renderGapStrip(msg.cars);
  renderOrderAndStats(msg.cars);
}

// ---- commentary audio: sequential playback (one voice, one speaker) ----
let audioEnabled = false;
const audioQueue = [];
let audioPlaying = false;
function drainAudio() {
  if (audioPlaying || !audioEnabled || audioQueue.length === 0) return;
  audioPlaying = true;
  const el = new Audio("data:audio/mp3;base64," + audioQueue.shift());
  el.onended = el.onerror = () => { audioPlaying = false; drainAudio(); };
  el.play().catch(() => { audioPlaying = false; });
}
$("audio-toggle").onclick = () => {
  audioEnabled = !audioEnabled;
  const b = $("audio-toggle");
  b.className = audioEnabled ? "live" : "muted";
  b.textContent = audioEnabled ? "🔊 LIVE AUDIO" : "🔇 MUTED";
  if (!audioEnabled) audioQueue.length = 0;
};

function addCommentary(msg) {
  if (msg.audio && audioEnabled) { audioQueue.push(msg.audio); drainAudio(); }
  const ph = $("placeholder"); if (ph) ph.remove();
  const pending = $("pending");
  if (msg.kind === "qa") pending.style.display = "none";
  const div = document.createElement("div");
  const cls = msg.kind === "qa" ? " qa" : msg.kind === "question" ? " question" : "";
  div.className = "call" + cls;
  const who = msg.kind === "question" ? "YOU · " : "";
  const isTagged = msg.kind && msg.kind !== "qa" && msg.kind !== "question";
  const tag = isTagged ? ` · <span class="tag">${msg.kind}</span>` : "";
  const foc = (msg.selected_car != null) ? ` · <span class="foc">▸ #${msg.selected_car}</span>` : "";
  div.innerHTML =
    `<div class="meta">${who}${fmtClock(msg.race_time_s)} · lap ${msg.lap}${tag}${foc}` +
    (msg.secs != null ? ` · ${msg.secs}s` : "") +
    `</div><div class="text">${msg.text}</div>`;
  const log = $("radiolog");
  log.insertBefore(div, pending);
  if (msg.kind === "question") pending.style.display = "block";
  log.scrollTop = log.scrollHeight;
}

function sendQuestion() {
  const input = $("question");
  const q = input.value.trim();
  if (!q || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: "ask", question: q }));
  input.value = "";
}
$("ask").onclick = sendQuestion;
$("question").addEventListener("keydown", e => { if (e.key === "Enter") sendQuestion(); });

// ---- simulator controls ----
async function simCall(action, payload) {
  const msg = $("sim-msg");
  try {
    const r = await fetch(`/api/sim/${action}`, {
      method: action === "config" ? "GET" : "POST",
      headers: { "Content-Type": "application/json" },
      body: payload ? JSON.stringify(payload) : undefined,
    });
    if (!r.ok) throw new Error(await r.text());
    msg.textContent = "";
    return await r.json();
  } catch (e) {
    msg.textContent = "sim: " + (e.message || "unreachable").slice(0, 80);
    return null;
  }
}
let simPaused = false;
function setPauseLabel() { $("sim-pause").textContent = simPaused ? "RESUME" : "PAUSE"; }
async function initSimBar() {
  const cfg = await simCall("config");
  if (!cfg) return;
  const nearest = [1, 2, 5].reduce((a, b) =>
    Math.abs(b - cfg.speed_multiplier) < Math.abs(a - cfg.speed_multiplier) ? b : a);
  $("sim-speed").value = String(nearest);
  $("sim-loop").checked = !!cfg.auto_restart;
  simPaused = !!cfg.paused; setPauseLabel();
}
$("sim-restart").onclick = async () => { await simCall("restart"); initSimBar(); };
$("sim-pause").onclick = async () => { const r = await simCall(simPaused ? "resume" : "pause"); if (r) { simPaused = !!r.paused; setPauseLabel(); } };
$("sim-speed").onchange = e => simCall("speed", { multiplier: Number(e.target.value) });
$("sim-loop").onchange = e => simCall("auto-restart", { enabled: e.target.checked });
$("sim-finish").onclick = async () => { await simCall("finish"); initSimBar(); };
initSimBar();

// ---- push-to-talk ----
let micStream = null, recorder = null, recChunks = [], recording = false;
async function pttStart() {
  if (recording) return;
  try { micStream = micStream || await navigator.mediaDevices.getUserMedia({ audio: true }); }
  catch { $("mic").textContent = "🚫"; $("mic").title = "Microphone blocked by the browser"; return; }
  recording = true; recChunks = [];
  recorder = new MediaRecorder(micStream);
  recorder.ondataavailable = e => { if (e.data.size) recChunks.push(e.data); };
  recorder.onstop = sendRecording;
  recorder.start();
  $("mic").classList.add("rec"); $("mic").textContent = "● REC";
}
function pttStop() {
  if (!recording) return;
  recording = false; recorder.stop();
  $("mic").classList.remove("rec"); $("mic").textContent = "🎤";
}
async function sendRecording() {
  const blob = new Blob(recChunks, { type: recorder.mimeType });
  if (blob.size < 1000) return;
  const mic = $("mic"); mic.classList.add("busy"); mic.textContent = "…";
  try {
    const r = await fetch("/api/stt", { method: "POST", body: blob });
    if (!r.ok) throw new Error();
    const { transcript } = await r.json();
    if (transcript) { $("question").value = transcript; setTimeout(sendQuestion, 600); }
  } catch { $("question").placeholder = "Didn't catch that — try again or type"; }
  finally { mic.classList.remove("busy"); mic.textContent = "🎤"; }
}
$("mic").addEventListener("mousedown", pttStart);
$("mic").addEventListener("touchstart", e => { e.preventDefault(); pttStart(); });
for (const ev of ["mouseup", "mouseleave", "touchend"]) $("mic").addEventListener(ev, pttStop);
document.addEventListener("keydown", e => {
  if (e.code === "Space" && !e.repeat && document.activeElement !== $("question")) { e.preventDefault(); pttStart(); }
});
document.addEventListener("keyup", e => {
  if (e.code === "Space" && document.activeElement !== $("question")) { e.preventDefault(); pttStop(); }
});

// ---- websocket ----
let ws, retry = 1000;
function connect() {
  const proto = location.protocol === "https:" ? "wss" : "ws";
  ws = new WebSocket(`${proto}://${location.host}/ws`);
  ws.onopen = () => {
    $("conn").textContent = "● live"; $("conn").className = "conn ok"; retry = 1000;
    sendSelection();  // always sync the server to THIS client (incl. clearing to field-wide)
  };
  ws.onmessage = e => {
    const msg = JSON.parse(e.data);
    if (msg.type === "state") renderState(msg);
    else if (msg.type === "radio") addCommentary(msg);
  };
  ws.onclose = () => {
    $("conn").textContent = "● reconnecting"; $("conn").className = "conn down";
    setTimeout(connect, retry); retry = Math.min(retry * 2, 10000);
  };
}
loadOutline();
connect();
